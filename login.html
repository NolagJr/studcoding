<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Coraic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#09090f;--surface2:#141520;--border2:#2a2d45;--orange:#ff7a2e;--orange-hi:#ff9555;--text:#f0f0ff;--sub:rgba(240,240,255,.6);--muted:rgba(240,240,255,.32);--success:#22d37f;--danger:#ff5470;}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,122,46,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,122,46,.028) 1px,transparent 1px);background-size:44px 44px;}
.bg-orb1{position:absolute;width:700px;height:700px;background:radial-gradient(circle,rgba(255,122,46,.14) 0%,transparent 60%);top:-300px;right:-200px;filter:blur(80px);animation:d1 20s ease-in-out infinite;}
.bg-orb2{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(120,80,255,.1) 0%,transparent 60%);bottom:-200px;left:-100px;filter:blur(100px);animation:d2 26s ease-in-out infinite;}
@keyframes d1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,40px)}}
@keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
.card{position:relative;z-index:1;width:100%;max-width:420px;background:rgba(15,16,24,.96);border:1px solid var(--border2);border-radius:24px;padding:48px 40px;box-shadow:0 40px 100px rgba(0,0,0,.7),0 0 0 1px rgba(255,122,46,.06);animation:ci .5s cubic-bezier(.22,1,.36,1) both;}
@keyframes ci{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.back{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);text-decoration:none;margin-bottom:32px;transition:color .15s;width:fit-content;}
.back:hover{color:var(--sub);}
.back svg{width:13px;height:13px;}
.logo{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:36px;}
.logo-mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#ff7a2e,#ff9555);display:flex;align-items:center;justify-content:center;box-shadow:0 0 28px rgba(255,122,46,.5);}
.logo-mark svg{width:20px;height:20px;}
.logo-name{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.3px;}
.title{font-family:'Cabinet Grotesk',sans-serif;font-size:28px;font-weight:900;letter-spacing:-.6px;text-align:center;margin-bottom:8px;}
.subtitle{font-size:14px;color:var(--sub);text-align:center;margin-bottom:32px;line-height:1.6;}
.alert{border-radius:10px;padding:12px 15px;font-size:13px;margin-bottom:16px;display:none;font-weight:500;line-height:1.5;}
.alert.show{display:block;}
.err{background:rgba(255,84,112,.1);border:1px solid rgba(255,84,112,.3);color:var(--danger);}
.ok{background:rgba(34,211,127,.1);border:1px solid rgba(34,211,127,.3);color:var(--success);}

.g-btn{width:100%;padding:15px;border:1px solid rgba(255,255,255,.12);border-radius:13px;background:rgba(255,255,255,.05);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:16px;}
.g-btn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.22);transform:translateY(-1px);}
.g-btn svg{width:20px;height:20px;flex-shrink:0;}
#g-render{display:none;}

.footer-txt{text-align:center;font-size:13px;color:var(--muted);margin-top:20px;}
.footer-txt a{color:var(--orange);font-weight:600;text-decoration:none;}
.footer-txt a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="bg"><div class="bg-grid"></div><div class="bg-orb1"></div><div class="bg-orb2"></div></div>
<div class="card">
  <a href="index.html" class="back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to home
  </a>
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
    <span class="logo-name">Coraic</span>
  </div>
  <div class="title">Welcome back</div>
  <div class="subtitle">Sign in with the Google account you used to sign up.</div>
  <div class="alert err" id="alertErr"></div>
  <div class="alert ok"  id="alertOk"></div>

  <!-- Styled button triggers a click on the hidden GIS button -->
  <button class="g-btn" onclick="googleSignIn()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
  <div id="g-render"></div>

  <div class="footer-txt">Don't have an account? <a href="signup.html">Sign up free</a></div>
</div>

<script>
const BASE             = 'https://studcoding-production-3b79.up.railway.app';
const GOOGLE_CLIENT_ID = '629306556157-dp0h5ui7sk1ans1l3aokafpvcfomflk0.apps.googleusercontent.com';

const ERROR_MESSAGES = {
  no_credential:  'Sign-in failed. Please try again.',
  invalid_token:  'Invalid Google token. Please try again.',
  token_mismatch: 'Authentication error. Please try again.',
  verify_failed:  'Could not verify with Google. Please try again.',
  no_email:       'Could not get your email from Google. Please try again.',
};

function showErr(msg) {
  const e = document.getElementById('alertErr');
  e.textContent = msg;
  e.className   = 'alert err show';
  document.getElementById('alertOk').className = 'alert ok';
}
function showOk(msg) {
  const e = document.getElementById('alertOk');
  e.textContent = msg;
  e.className   = 'alert ok show';
  document.getElementById('alertErr').className = 'alert err';
}

// ── On page load: handle redirect-mode return ─────────────────
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');
  const error  = params.get('error');

  // Clean the URL immediately so the token/error doesn't persist in history
  if (token || error) {
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  if (token) {
    // Successful redirect-mode login — save token and go to dashboard
    localStorage.setItem('stud_session_v3', token);
    showOk('Signed in! Redirecting...');
    setTimeout(() => window.location.href = 'dashboard.html', 500);
    return;
  }

  if (error) {
    showErr(ERROR_MESSAGES[error] || 'Sign-in failed. Please try again.');
  }

  // Init Google once the GIS library has loaded
  if (typeof google !== 'undefined') {
    initGoogle();
  } else {
    document.querySelector('script[src*="gsi/client"]').addEventListener('load', initGoogle);
  }
});

// ── Initialize Google in redirect mode ───────────────────────
function initGoogle() {
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    ux_mode:   'redirect',
    login_uri: BASE + '/auth/google',
  });

  // Render the real GIS button hidden — we trigger it programmatically
  google.accounts.id.renderButton(
    document.getElementById('g-render'),
    { theme: 'filled_black', size: 'large', width: 340 }
  );
}

// Called by our styled button — synchronously clicks the hidden GIS button
// so it's treated as a direct user gesture (no popup blocker issues)
function googleSignIn() {
  const btn = document.querySelector('#g-render div[role=button]');
  if (btn) { btn.click(); return; }
  showErr('Google Sign-In is still loading. Please try again in a moment.');
}
</script>
</body>
</html>
